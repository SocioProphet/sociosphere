# sociosphere workspace controller: canonical ownership registry
#
# Each entry maps a workspace namespace to the authoritative GitHub repo.
# This file is the single source of truth for namespace → repo ownership.
# All manifest entries must appear here.
#
# Roles: component | adapter | third_party | governance | docs | tool
# License is non-authoritative; run `make inventory` for the full report.

namespaces:

  # --- Components ---
  components/prophet_cli:
    canonical_repo: SocioProphet/prophet-platform
    role: component
    license_hint: MIT
    description: "Core platform CLI + services (Go)"

  components/sourceos_a2a_mcp_bootstrap:
    canonical_repo: SocioProphet/sourceos-a2a-mcp-bootstrap
    role: component
    license_hint: MIT
    description: "SourceOS A2A/MCP bootstrapping"

  components/socioprophet_web:
    canonical_repo: SocioProphet/socioprophet
    role: component
    license_hint: MIT
    description: "Main collaborative platform web app"

  components/human_digital_twin:
    canonical_repo: SocioProphet/human-digital-twin
    role: component
    license_hint: MIT
    description: "Human API surface: zero-trust artifact promotion/export"

  components/ontogenesis:
    canonical_repo: SocioProphet/ontogenesis
    role: component
    license_hint: MIT
    description: "Ontology generation tooling"

  components/agentplane:
    canonical_repo: SocioProphet/agentplane
    role: component
    license_hint: MIT
    description: "Execution control plane: bundle→validate→run→evidence→replay"

  components/new_hope:
    canonical_repo: SocioProphet/new-hope
    role: component
    license_hint: MIT
    description: "Safe carrier ingest + membrane decisions"

  components/slash_topics:
    canonical_repo: SocioProphet/slash-topics
    role: component
    license_hint: MIT
    description: "Governed topic packs + membrane outputs"

  components/dev_api:
    canonical_repo: null
    role: component
    description: "Dev API server (local-only, no upstream repo yet)"

  components/hdt_app:
    canonical_repo: null
    role: component
    description: "Human digital twin app UI (local-only, no upstream repo yet)"

  # --- Adapters ---
  adapters/mcp_a2a_zero_trust:
    canonical_repo: SocioProphet/mcp-a2a-zero-trust
    role: adapter
    license_hint: MIT
    description: "MCP + A2A zero-trust bootstrap adapter"

  adapters/delivery_excellence_automation:
    canonical_repo: SocioProphet/delivery-excellence-automation
    role: adapter
    license_hint: MIT
    description: "DelEx-OS automation: RBAC, CI validation, routing"

  adapters/cc:
    canonical_repo: null
    role: adapter
    description: "Container/exec adapter (local-only)"

  adapters/configs:
    canonical_repo: null
    role: adapter
    description: "Policy/defaults adapter (local-only)"

  # --- Governance ---
  governance/delivery_excellence:
    canonical_repo: SocioProphet/delivery-excellence
    role: governance
    license_hint: MIT
    description: "DelEx-OS governance: scope, templates, ADRs, KPIs/OKRs"

  # --- Third-party ---
  third_party/tritrpc:
    canonical_repo: SocioProphet/TriTRPC
    role: third_party
    license_hint: MIT
    description: "Ternary-native RPC protocol (submodule-pinned)"
    pin_policy: "exact-rev only; do not float on main"

  third_party/gaia_world_model:
    canonical_repo: SocioProphet/gaia-world-model
    role: third_party
    license_hint: MIT
    description: "Auditable Earth digital twin + provenance-pinned ontologies"

  # --- Tools ---
  tools/workspace_inventory:
    canonical_repo: SocioProphet/workspace-inventory
    role: tool
    license_hint: MIT
    description: "Workspace inventory tracking"

  # --- Docs ---
  docs/socioprophet_docs:
    canonical_repo: SocioProphet/socioprophet-docs
    role: docs
    license_hint: MIT
    description: "Hugo documentation site"

  docs/socioprophet_integration:
    canonical_repo: null
    role: docs
    description: "Local integration notes and runner configs"

  # --- Capability packages (caps/) ---
  caps/slash-topics:
    canonical_repo: SocioProphet/slash-topics
    role: component

  caps/new-hope:
    canonical_repo: SocioProphet/new-hope
    role: component

  caps/semantic-search-bi:
    canonical_repo: SocioProphet/prophet-platform
    role: component

hygiene:
  forbid: [".DS_Store", "__MACOSX"]
  submodule_paths_must_be_under: "third_party/"
  third_party_must_be_pinned: true
