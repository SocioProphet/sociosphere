[workspace]
name = "sociosphere"
version = "0.1"

[workspace.policy]
policy_pack_ref = "protocol/agentic-workbench/v1/policy_packs/workspace-default.v0.1.json"
policy_pack_hash = "sha256:5bf7c8abab452ccf16685af2780af25d0d85e9a09a7c4b9a31e548a9fc50296c"
trust_profile_ref = "protocol/agentic-workbench/v1/trust_profiles/default.v0.1.json"
ledger_mode = "required"
attestation_required = true
default_quorum_rule = "2of3-human"

# NOTE: This manifest supports both local materialized repos (local_path)
# and remote repos (url + ref/rev). The lock file resolves remote inputs.
# Local development overrides should be expressed directly in this file by
# updating each repo entry's source fields (for example, `local_path` for a
# local checkout or `url` + `ref`/`rev` for a remote source).
# Canonical repo inventory: registry/canonical-repos.yaml (materialized entries + remote-only canonical mirrors live here)
# Merge order for open PRs: governance/MERGE-ORDER.md
# Controlled glossary: docs/GLOSSARY.md
# Formal ontology (JSON-LD): ontologies/sociosphere.jsonld
# Formal ontology (TTL/RDF): ontologies/sociosphere.ttl
# Fields:
#   name          – stable identifier
#   role          – component | adapter | tool | protocol | execution-plane |
#                   library | ontology | topic-pack | security | standards |
#                   replay | docs
#   url           – canonical GitHub HTTPS URL
#   ref           – branch or tag to track
#   rev           – exact commit SHA (overrides ref; pinned in lock)
#   local_path    – path inside this workspace after materialization
#   license_hint  – non-authoritative; used by supply-chain policy checks
#   entry         – optional runtime metadata (kind, module, etc.)
#   required_capabilities – adapter-only capability declarations

# ── Control-plane tools ──────────────────────────────────────────────────────

[[repos]]
name = "workspace_inventory"
role = "tool"
url = "https://github.com/SocioProphet/workspace-inventory"
ref = "main"
license_hint = "MIT"

