[workspace]
name = "sociosphere"
version = "0.1"

[workspace.policy]
policy_pack_ref = "protocol/agentic-workbench/v1/policy_packs/workspace-default.v0.1.json"
policy_pack_hash = "sha256:5bf7c8abab452ccf16685af2780af25d0d85e9a09a7c4b9a31e548a9fc50296c"
trust_profile_ref = "protocol/agentic-workbench/v1/trust_profiles/default.v0.1.json"
ledger_mode = "required"
attestation_required = true
default_quorum_rule = "2of3-human"

# NOTE: This manifest supports both local materialized repos (local_path)
# and remote repos (url + ref/rev). The lock file resolves remote inputs.
# Local development overrides should be expressed in manifest/overrides.toml.

[[repos]]
name = "prophet_cli"
role = "component"
local_path = "components/prophet_cli"
entry = { kind = "go", module = "./" }

[[repos]]
name = "sourceos_a2a_mcp_bootstrap"
role = "component"
local_path = "components/sourceos_a2a_mcp_bootstrap"

[[repos]]
name = "socioprophet-web"
role = "component"
local_path = "components/socioprophet-web"

[[repos]]
name = "dev-api"
role = "component"
local_path = "components/dev-api"

[[repos]]
name = "hdt_app"
role = "component"
local_path = "components/hdt_app"

[[repos]]
name = "human_digital_twin"
role = "component"
local_path = "components/human_digital_twin"

[[repos]]
name = "ontogenesis"
role = "component"
local_path = "components/ontogenesis"

[[repos]]
name = "cc"
role = "adapter"
local_path = "adapters/cc"
required_capabilities = ["container_exec", "fs_ops", "deps_inventory"]

[[repos]]
name = "configs"
role = "adapter"
local_path = "adapters/configs"
required_capabilities = ["policy", "defaults"]

[[repos]]
name = "socioprophet_integration"
role = "docs"
local_path = "components/socioprophet_integration"

[[repos]]
name = "agentplane"
role = "component"
url = "https://github.com/SocioProphet/agentplane.git"
ref = "main"
local_path = "components/agentplane"
trust_zone = "control"
trust_profile_ref = "protocol/agentic-workbench/v1/trust_profiles/control-plane.v0.1.json"
required_grants = ["agentplane.run:exec", "agentplane.replay:compute"]

[[repos]]
name = "mcp-a2a-zero-trust"
role = "adapter"
url = "https://github.com/SocioProphet/mcp-a2a-zero-trust.git"
ref = "main"
local_path = "adapters/mcp-a2a-zero-trust"
required_capabilities = ["policy", "attestation", "grant", "ledger", "capability_registry"]
trust_zone = "control"
trust_profile_ref = "protocol/agentic-workbench/v1/trust_profiles/control-plane.v0.1.json"
