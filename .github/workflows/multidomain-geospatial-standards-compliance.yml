name: Multi-Domain Geospatial Standards Compliance

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate implementation standards compliance registry
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Validate multi-domain geospatial standards compliance registry
        run: make multidomain-geospatial-standards-compliance-validate
