name: Proof apparatus validation

on:
  workflow_call:
    inputs:
      domain_repo:
        required: false
        type: string
      domain_ref:
        required: false
        type: string
      domain_sha:
        required: false
        type: string
  workflow_dispatch:
  repository_dispatch:
    types:
      - proof_apparatus_domain_repo_changed
  schedule:
    - cron: '17 9 * * *'
  push:
    paths:
      - 'manifest/proof-workspace.toml'
      - 'protocol/proof-apparatus-workspace/**'
      - 'standards/proof-apparatus/**'
      - 'registry/proof-adjacency-ranking.v0.yaml'
      - 'templates/proof-research/**'
      - 'tools/validate_proof_apparatus.py'
      - 'tools/test_proof_adapter_negative_cases.py'
      - 'tools/materialize_proof_workspace.py'
      - 'tools/run_proof_workspace_gates.py'
      - 'tools/generate_proof_workspace_outputs.py'
      - 'docs/runbooks/proof-research-workflow.md'
      - 'docs/runbooks/onboard-math-physics-research-repo.md'
      - 'docs/runbooks/proof-apparatus-first-green-verification.md'
      - '.github/workflows/proof-apparatus.yml'
  pull_request:
    paths:
      - 'manifest/proof-workspace.toml'
      - 'protocol/proof-apparatus-workspace/**'
      - 'standards/proof-apparatus/**'
      - 'registry/proof-adjacency-ranking.v0.yaml'
      - 'templates/proof-research/**'
      - 'tools/validate_proof_apparatus.py'
      - 'tools/test_proof_adapter_negative_cases.py'
      - 'tools/materialize_proof_workspace.py'
      - 'tools/run_proof_workspace_gates.py'
      - 'tools/generate_proof_workspace_outputs.py'
      - 'docs/runbooks/proof-research-workflow.md'
      - 'docs/runbooks/onboard-math-physics-research-repo.md'
      - 'docs/runbooks/proof-apparatus-first-green-verification.md'
      - '.github/workflows/proof-apparatus.yml'

jobs:
  validate-proof-apparatus:
    runs-on: ubuntu-latest
    steps:
      - name: Log trigger context
        run: |
          echo "event=${{ github.event_name }}"
          echo "caller_repo=${{ github.repository }}"
          echo "domain_repo=${{ inputs.domain_repo || github.event.client_payload.repository || github.repository }}"
          echo "domain_ref=${{ inputs.domain_ref || github.event.client_payload.ref || github.ref_name }}"
          echo "domain_sha=${{ inputs.domain_sha || github.event.client_payload.sha || github.sha }}"

      - name: Checkout SocioSphere controller workspace
        if: github.repository == 'SocioProphet/sociosphere'
        uses: actions/checkout@v4

      - name: Checkout SocioSphere controller workspace from caller repo
        if: github.repository != 'SocioProphet/sociosphere'
        uses: actions/checkout@v4
        with:
          repository: SocioProphet/sociosphere
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate controller-only proof apparatus metadata
        run: python3 tools/validate_proof_apparatus.py

      - name: Run proof adapter negative tests
        run: python3 tools/test_proof_adapter_negative_cases.py

      - name: Materialize proof workspace repos
        env:
          PROOF_WORKSPACE_DOMAIN_REPO: ${{ inputs.domain_repo || github.event.client_payload.repository || github.repository }}
          PROOF_WORKSPACE_DOMAIN_REF: ${{ inputs.domain_ref || github.event.client_payload.ref || github.ref_name }}
          PROOF_WORKSPACE_DOMAIN_SHA: ${{ inputs.domain_sha || github.event.client_payload.sha || github.sha }}
        run: python3 tools/materialize_proof_workspace.py --force

      - name: Strictly validate materialized proof adapters
        run: |
          mkdir -p status/proof-apparatus
          set +e
          python3 tools/validate_proof_apparatus.py --strict-adapters 2>&1 | tee status/proof-apparatus/strict-adapter-validation.log
          status=${PIPESTATUS[0]}
          echo "$status" > status/proof-apparatus/strict-adapter-validation.exitcode
          exit "$status"

      - name: Run proof workspace controller gates
        run: python3 tools/run_proof_workspace_gates.py

      - name: Generate proof workspace controller outputs
        run: python3 tools/generate_proof_workspace_outputs.py

      - name: Write failure context artifact
        if: failure()
        run: |
          mkdir -p status/proof-apparatus
          domain_repo="${{ inputs.domain_repo || github.event.client_payload.repository || github.repository }}"
          domain_name="${domain_repo#*/}"
          adapter_path="proof/${domain_name}/proof-adapter.json"
          cp "$adapter_path" status/proof-apparatus/materialized-domain-proof-adapter.json 2>/dev/null || true
          cat > status/proof-apparatus/failure-context.md <<'EOF'
          # Proof Apparatus Failure Context

          This run failed before normal controller output generation completed.

          ## Trigger

          - event: ${{ github.event_name }}
          - caller_repo: ${{ github.repository }}
          - domain_repo: ${{ inputs.domain_repo || github.event.client_payload.repository || github.repository }}
          - domain_ref: ${{ inputs.domain_ref || github.event.client_payload.ref || github.ref_name }}
          - domain_sha: ${{ inputs.domain_sha || github.event.client_payload.sha || github.sha }}
          - run_id: ${{ github.run_id }}
          - run_attempt: ${{ github.run_attempt }}

          ## Failure evidence

          See `strict-adapter-validation.log` for the first adapter validation error. See `materialized-domain-proof-adapter.json` for the adapter content checked at the triggering SHA when available.
          EOF

      - name: Print failure artifact summary
        if: failure()
        run: |
          echo '--- proof apparatus failure artifact manifest ---'
          find status/proof-apparatus -type f -maxdepth 1 -print | sort
          echo '--- strict-adapter-validation.exitcode ---'
          cat status/proof-apparatus/strict-adapter-validation.exitcode 2>/dev/null || true
          echo '--- strict-adapter-validation.log ---'
          cat status/proof-apparatus/strict-adapter-validation.log 2>/dev/null || true
          echo '--- failure-context.md ---'
          cat status/proof-apparatus/failure-context.md 2>/dev/null || true
          echo '--- materialized adapter M6 state snippet ---'
          python3 - <<'PY'
          import json
          from pathlib import Path
          path = Path('status/proof-apparatus/materialized-domain-proof-adapter.json')
          if path.exists():
              data = json.loads(path.read_text())
              for claim in data.get('claims', []):
                  if claim.get('claim_id') == 'BSD-M6-002-four-descent-named-primes':
                      print(json.dumps({
                          'claim_id': claim.get('claim_id'),
                          'state': claim.get('state'),
                          'severity': claim.get('severity'),
                          'non_claim_refs': claim.get('non_claim_refs'),
                          'boundary': claim.get('boundary'),
                      }, indent=2))
          PY

      - name: Upload proof apparatus controller outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: proof-apparatus-controller-outputs
          path: status/proof-apparatus/**
          if-no-files-found: warn
