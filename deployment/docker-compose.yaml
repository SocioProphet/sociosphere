---
# Docker Compose – local development setup for the automation framework.
# Usage:  docker compose up --build
#
# Services
# --------
#   webhooks  – Flask webhook handler (port 5000)
#   scheduler – APScheduler daemon
#   redis     – optional job store / cache for local dev
#
# Environment
# -----------
# Copy .env.example to .env and fill in GITHUB_WEBHOOK_SECRET and
# GITHUB_TOKEN before starting.

version: "3.9"

services:
  webhooks:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    command: python -m automation.webhooks
    ports:
      - "5000:5000"
    environment:
      GITHUB_WEBHOOK_SECRET: "${GITHUB_WEBHOOK_SECRET:-dev-secret}"
      WEBHOOK_PORT: "5000"
      REDIS_URL: "redis://redis:6379/0"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    volumes:
      - ../automation:/app/automation
      - ../registry:/app/registry:ro
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  scheduler:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    command: python -m automation.scheduler
    environment:
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      REDIS_URL: "redis://redis:6379/0"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    volumes:
      - ../automation:/app/automation
      - ../registry:/app/registry:ro
      - scheduler-jobstore:/app/jobstore
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: "redis:7-alpine"
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  scheduler-jobstore:
  redis-data:

networks:
  default:
    name: sociosphere-automation
