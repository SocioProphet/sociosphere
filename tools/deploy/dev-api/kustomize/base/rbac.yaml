apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dev-api
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["dev-api-config"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dev-api
subjects:
  - kind: ServiceAccount
    name: dev-api
roleRef:
  kind: Role
  name: dev-api
  apiGroup: rbac.authorization.k8s.io
