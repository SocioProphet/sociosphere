apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-api
spec:
  replicas: 1
  selector:
    matchLabels: { app: dev-api }
  template:
    metadata:
      labels: { app: dev-api }
    spec:
      serviceAccountName: dev-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: dev-api
          image: ghcr.io/socioprophet/dev-api:dev
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              valueFrom: { configMapKeyRef: { name: dev-api-config, key: PORT } }
          ports:
            - containerPort: 5175
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
