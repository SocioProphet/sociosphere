# registry/devops-automation.yaml
# Build, test, and deploy rules for the SocioProphet repository ecosystem
version: "1.0.0"
updated_at: "2026-04-06"

defaults:
  ci_provider: github_actions
  docker_registry: ghcr.io/socioprophet
  k8s_cluster: socioprophet-prod
  timeout_minutes: 30
  retry_count: 2
  retry_backoff_seconds: 30

language_build_templates:
  python:
    install: "pip install -r requirements.txt"
    lint: "ruff check . && mypy ."
    test: "pytest --tb=short -q"
    build_artifact: wheel
    build_cmd: "python -m build"

  typescript:
    install: "npm ci"
    lint: "npm run lint"
    test: "npm test"
    build_cmd: "npm run build"
    build_artifact: dist

  go:
    install: "go mod download"
    lint: "golangci-lint run"
    test: "go test ./..."
    build_cmd: "go build ./..."
    build_artifact: binary

  shell:
    lint: "shellcheck **/*.sh"
    test: "bats tests/"
    build_artifact: null

  yaml:
    lint: "yamllint ."
    test: null
    build_artifact: null

repos:
  sociosphere:
    language: TypeScript
    build_template: typescript
    ci_steps:
      - name: ui-install
        cmd: "make ui-install"
      - name: ui-check
        cmd: "make ui-check"
      - name: validate-standards
        cmd: "make validate-standards"
    deploy: false
    fips_required: false

  tritrpc:
    language: Go
    build_template: go
    ci_steps:
      - name: build
        cmd: "go build ./..."
      - name: test
        cmd: "go test ./..."
      - name: lint
        cmd: "golangci-lint run"
    deploy: false
    fips_required: false

  prophet-platform:
    language: Python
    build_template: python
    ci_steps:
      - name: install
        cmd: "pip install -r requirements.txt"
      - name: lint
        cmd: "ruff check ."
      - name: test
        cmd: "pytest --tb=short -q"
      - name: build-image
        cmd: "docker build -t ${DOCKER_REGISTRY}/prophet-platform:${TAG} ."
    deploy: true
    deploy_steps:
      - name: push-image
        cmd: "docker push ${DOCKER_REGISTRY}/prophet-platform:${TAG}"
      - name: apply-k8s
        cmd: "kubectl apply -f k8s/platform/"
    fips_required: true
    fips_validator: "python fips-compliance/checker.py --target prophet-platform"

  embeddings-service:
    language: Python
    build_template: python
    ci_steps:
