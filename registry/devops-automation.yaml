  zero-trust-bindings:
    language: Python
    build_template: python
    ci_steps:
      - name: install
        cmd: "pip install -r requirements.txt"
      - name: test
        cmd: "pytest --tb=short -q"
    deploy: false
    fips_required: true

  integration-tests:
    language: Python
    build_template: python
    ci_steps:
      - name: install
        cmd: "pip install -r requirements.txt"
      - name: run
        cmd: "pytest --tb=short -q"
    deploy: false
    fips_required: false
    requires_services: [prophet-platform, trust-registry]

  e2e-tests:
    language: TypeScript
    build_template: typescript
    ci_steps:
      - name: install
        cmd: "npm ci && npx playwright install --with-deps"
      - name: run
        cmd: "npx playwright test"
    deploy: false
    fips_required: false
    requires_services: [prophet-ui]

  load-tests:
    language: JavaScript
    build_template: typescript
    ci_steps:
      - name: run
        cmd: "k6 run tests/load-test.js"
    deploy: false
    fips_required: false
    requires_services: [prophet-platform, embeddings-service]

pipeline_stages:
  - id: lint
    runs_on_pr: true
    runs_on_push_main: true
    blocking: true

  - id: build
    runs_on_pr: true
    runs_on_push_main: true
    blocking: true

  - id: test
    runs_on_pr: true
    runs_on_push_main: true
    blocking: true

  - id: fips_check
    runs_on_pr: true
    runs_on_push_main: true
    blocking: true
    applies_to_fips_required_only: true

  - id: build_image
    runs_on_pr: false
    runs_on_push_main: true
    blocking: true
    applies_to_deployable_only: true

  - id: push_image
    runs_on_pr: false
    runs_on_push_main: true
    blocking: true
    applies_to_deployable_only: true

  - id: deploy
    runs_on_pr: false
    runs_on_push_main: true
    blocking: false
    applies_to_deployable_only: true
    requires_approval: false
    environment: production
