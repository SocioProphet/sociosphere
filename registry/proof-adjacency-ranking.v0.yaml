version: "0.1"
controller: SocioProphet/sociosphere
status: integrated
source_backlog: workbench/backlog/proof-adjacency-ranking-tranche-2026-05-11.md

adjacency_axes:
  object:
    description: Same machinery or same kind of mathematical object.
    controller_use: Direct object-level proximity for Mode 1 computation or Mode 3 diagnostic.
  methodology:
    description: Same problem shape; SocioProphet evidence discipline transfers even when mathematical objects differ.
    controller_use: Proof-governance transfer, obstruction typing, non-claim discipline, and evidence-gate reuse.
  outcome:
    description: Same kind of finite-order, torsion, regulator, comparison-isomorphism, or residual phenomenon in another corridor.
    controller_use: Diagnostic or technique-transfer lane, not theorem promotion.
  vocabulary:
    description: Similar mathematical vocabulary but no active apparatus reach.
    controller_use: Map-only or glossary-only corridor unless new object-level evidence appears.
  none:
    description: No meaningful proof-apparatus adjacency at current scope.
    controller_use: Keep on global map only; do not create active proof lanes.

modes:
  mode_1:
    description: Direct computation or finite executable check on current apparatus objects.
  mode_2:
    description: Technique transfer, comparison template, or cross-program structural alignment.
  mode_3:
    description: Diagnostic: identify missing objects, bridges, certificates, or obstruction walls.

review_repairs:
  math_placeholders_repaired: true
  repaired_terms:
    - chi_p finite phase characters
    - chi_13 finite phase character
    - mu_2 triple-point setup
    - n mod 8 BSD root-number datum
    - Deligne level-1 unit
    - Deligne level-2 cup-product symbol
    - Bockstein carry cocycle
    - branch-killing cyclic cover
    - tame symbol
    - Q for Hilbert tenth over the rationals
  claim_status_default: diagnosed_or_speculative
  theorem_promotion_allowed: false

