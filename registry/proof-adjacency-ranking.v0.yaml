    adjacency: [object]
    mode: mode_1
    owner_repo: SocioProphet/Heller-Godel
    controller_state: scoped
    fallout: New torsion examples or negative structural distinction tests from chain/Catalan/Motzkin Deligne classes.
    non_claims:
      - Does not claim Hodge, generalized Hodge, or algebraic-cycle realization.
      - Does not claim a full Atiyah-Hirzebruch integral-Chern bridge.
    required_gates:
