# change-propagation-rules.yaml — SocioProphet cascade rules
# Defines what happens when a repo merges to main:
#   notify: send status event to downstream repos
#   ci-trigger: trigger CI in downstream repos
#   block: prevent merge in downstream repos until this merges first
# schema_version: 1

metadata:
  version: "1.0"
  total_rules: 12

rules:

  - id: PROP-001
    trigger_repo: prophet-platform-standards
    trigger_event: main_merge
    description: "ADR foundation merged — all governed repos must revalidate compliance."
    cascades:
      - target: socioprophet-standards-storage
        action: ci-trigger
        reason: "Storage standards must be re-checked against updated platform ADRs"
      - target: socioprophet-standards-knowledge
        action: ci-trigger
        reason: "Knowledge standards must be re-checked against updated platform ADRs"
      - target: agentplane
        action: ci-trigger
        reason: "Execution plane must revalidate against updated ADR-040/050/060"
      - target: TriTRPC
        action: ci-trigger
        reason: "Protocol must revalidate against updated transport/audit ADRs"
      - target: sociosphere
        action: notify
        reason: "Workspace controller should update compliance dashboard"

  - id: PROP-002
    trigger_repo: socioprophet-standards-storage
    trigger_event: main_merge
    description: "Storage/schema standards merged — shared schema consumers must revalidate."
    cascades:
      - target: agentplane
        action: ci-trigger
        reason: "agentplane depends on shared schemas from standards-storage"
      - target: TriTRPC
        action: ci-trigger
        reason: "TriTRPC local-hybrid slice depends on shared schemas"
      - target: sociosphere
        action: notify
        reason: "Compliance checker should update storage compliance status"

  - id: PROP-003
    trigger_repo: TriTRPC
    trigger_event: main_merge
    description: "TriTRPC protocol change — all transport consumers must revalidate."
    cascades:
      - target: agentplane
        action: ci-trigger
        reason: "agentplane uses TriTRPC for execution transport"
      - target: semantic-serdes
        action: ci-trigger
        reason: "semantic-serdes implements TriTRPC serialization"
      - target: mcp-a2a-zero-trust
        action: ci-trigger
        reason: "zero-trust layer uses TriTRPC transport"
      - target: sociosphere
        action: notify
        reason: "Workspace controller should record TriTRPC version bump"

  - id: PROP-004
    trigger_repo: agentplane
    trigger_event: main_merge
    description: "Execution plane change — all receipt-path contributors must revalidate."
    cascades:
      - target: slash-topics
        action: notify
        reason: "slash-topics provides context to agentplane receipt path"
      - target: human-digital-twin
        action: notify
        reason: "human-digital-twin provides policy events to agentplane receipt path"
      - target: cairnpath-mesh
        action: ci-trigger
        reason: "cairnpath-mesh depends on agentplane bundle artifacts"
      - target: sociosphere
        action: notify
        reason: "Workspace controller should update agentplane status"

  - id: PROP-005
    trigger_repo: sociosphere
    trigger_event: registry_update
    description: "Registry updated — propagate new canonical-repos to all dependent tools."
    cascades:
      - target: workspace-inventory
        action: ci-trigger
        reason: "workspace-inventory must re-sync with updated registry"

  - id: PROP-006
    trigger_repo: gaia-world-model
    trigger_event: main_merge
    description: "GAIA world model ontology change — all ontology consumers must revalidate."
    cascades:
      - target: ontogenesis
        action: ci-trigger
        reason: "ontogenesis generates from gaia-world-model"
      - target: socius-kg
        action: notify
        reason: "socius-kg uses GAIA ontology"
      - target: prophet-domain-gaia-ontology
        action: notify
        reason: "potential overlap — check deduplication status"
      - target: sociosphere
        action: notify
        reason: "Update GAIA data-plane status"

  - id: PROP-007
    trigger_repo: prophet-core-contracts
    trigger_event: main_merge
    description: "Core contracts changed — all core components must revalidate."
    cascades:
      - target: prophet-core-libs
        action: ci-trigger
        reason: "libs implement contracts"
      - target: prophet-core-policy
        action: ci-trigger
        reason: "policy enforces contracts"
      - target: prophet-core-ledger
        action: ci-trigger
        reason: "ledger must remain contract-compatible"

  - id: PROP-008
    trigger_repo: prophet-core-libs
    trigger_event: main_merge
    description: "Core libs changed — dependent core components must revalidate."
    cascades:
      - target: prophet-core-catalog
        action: ci-trigger
        reason: "catalog uses core libs"
      - target: prophet-core-query
        action: ci-trigger
        reason: "query uses core libs"
      - target: prophet-core-ingest
        action: ci-trigger
        reason: "ingest uses core libs"
      - target: prophet-core-scaffolder
        action: ci-trigger
        reason: "scaffolder uses core libs"

  - id: PROP-009
    trigger_repo: socioprophet-standards-knowledge
    trigger_event: main_merge
    description: "Knowledge standards changed — schema consumers must revalidate."
    cascades:
      - target: gaia-world-model
        action: ci-trigger
        reason: "GAIA ontology must comply with knowledge standards"
      - target: slash-topics
        action: notify
        reason: "topic packs should re-verify schema compliance"

  - id: PROP-010
    trigger_repo: mcp-a2a-zero-trust
    trigger_event: main_merge
    description: "Zero-trust layer changed — security-dependent components must revalidate."
    cascades:
      - target: agentplane
        action: notify
        reason: "agentplane security posture may need updating"
      - target: sociosphere
        action: notify
        reason: "Update security compliance status"

  - id: PROP-011
    trigger_repo: sourceos-a2a-mcp-bootstrap
    trigger_event: main_merge
    description: "SourceOS bootstrap changed — check deduplication status with mcp-a2a-zero-trust."
    cascades:
      - target: mcp-a2a-zero-trust
        action: notify
        reason: "Deduplication target — check for scope divergence"
      - target: agentplane
        action: notify
        reason: "agentplane may depend on bootstrap tooling"

  - id: PROP-012
    trigger_repo: prophet-core-policy
    trigger_event: main_merge
    description: "Policy engine changed — all policy-governed repos must revalidate."
    cascades:
      - target: agentplane
        action: ci-trigger
        reason: "agentplane execution is policy-governed"
      - target: prophet-core-infra
        action: notify
        reason: "infra Kyverno policies may need updating"
      - target: sociosphere
        action: notify
        reason: "Update governance compliance status"
