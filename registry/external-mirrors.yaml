# registry/external-mirrors.yaml
# Cross-organization mirror and external-canonical metadata.
# Purpose: allow sociosphere governance + tooling to reason about repos that live
# outside the SocioProphet org (e.g., SociOS-Linux and SourceOS-Linux).

version: "1.0.0"
updated_at: "2026-04-17"

mirrors:
  # ── Mirrors of upstream coreos/* ──────────────────────────────────────────
  - name: socios-installer
    org: SociOS-Linux
    url: https://github.com/SociOS-Linux/socios-installer
    upstream:
      url: https://github.com/coreos/coreos-installer
      ref: main
      head_sha: 6e7b4de82668da1089e3c023473f254004656806
      checked_at: "2026-04-17"
    mirror_head_sha: 66b82852108b6fcba0bf93bb78dd88e4ae1163d4
    drift:
      status: behind
      note: "mirror contains local fog-entrypoint docs + profile placeholder; still needs upstream sync"

  - name: socios-coreos-config
    org: SociOS-Linux
    url: https://github.com/SociOS-Linux/socios-coreos-config
    upstream:
      url: https://github.com/coreos/fedora-coreos-config
      ref: testing-devel
      head_sha: d927ac46001ae13047481aff07ddf5908fa84cfa
      checked_at: "2026-04-17"
    mirror_head_sha: 29b4e73139de6e0985ace0958f5f95e16a3c5835
    drift: { status: behind, note: "lockfile bumps are pipeline-generated; keep mirror current" }

canonical_cross_org:
  # ── SociOS/SourceOS provisioning + contracts ──────────────────────────────
  - name: socios-ignition
    org: SociOS-Linux
    url: https://github.com/SociOS-Linux/socios-ignition
    role: os_provisioning
    note: "Butane configs + generated Ignition artifacts + wrapper tooling"

  - name: sourceos-spec
    org: SourceOS-Linux
    url: https://github.com/SourceOS-Linux/sourceos-spec
    role: standards
    note: "Typed contracts + OpenAPI/AsyncAPI + JSON Schema families"
