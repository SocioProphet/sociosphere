schema_version: 0.1.0
standard: lawful-learning-lane
status: phase8_registration_seed
owner: sociosphere

purpose: >-
  Cross-repo registration for the lawful-learning lane. SocioSphere owns lane
  discovery, registry routing, and release-governance indexing. Superconscious
  owns doctrine, claim-ledger discipline, certificate schemas, checker fixtures,
  and trust-surface composition constraints. This registration does not promote
  schemas, execute runtime code, verify runtime evidence, or promote frontier claims.

lane:
  id: lawful-learning
  registered_at: '2026-05-13'
  doctrine_repo: SocioProphet/superconscious
  research_evidence_repo: SocioProphet/systems-learning-loops
  future_schema_promotion_repo: SourceOS-Linux/sourceos-spec

canonical_namespaces:
  doctrine/lawful-learning:
    canonical_repo: superconscious
    responsibility: lawful-learning doctrine, claim-ledger discipline, certificate schemas, checker fixtures, and trust-surface composition constraints

  registry/lawful-learning:
    canonical_repo: sociosphere
    responsibility: lane registration, discovery, routing, phase status, and governance indexing

  evidence/lawful-learning:
    canonical_repo: systems-learning-loops
    responsibility: source registry, claims registry, invariant patterns, ontology, and research evidence corpus

  schemas/lawful-learning/promoted:
    canonical_repo: sourceos-spec
    responsibility: promoted canonical schemas after stability review

  vocabulary/lawful-learning:
    canonical_repo: ontogenesis
    responsibility: semantic vocabulary and draft contract work before promotion

  execution/lawful-learning:
    canonical_repo: agentplane
    responsibility: runtime evidence, replay, receipts, and execution surface

  admission/lawful-learning:
    canonical_repo: policy-fabric
    responsibility: cancellation, admission, denial, modification, escalation, and policy decisions

  model-governance/lawful-learning:
    canonical_repo: model-governance-ledger
    responsibility: consent, attribution, intervention receipts, model governance, and audit records

  routing/lawful-learning:
    canonical_repo: model-router
    responsibility: provider and model route decisions

repo_alignment:
  sociosphere:
    layer: workspace-registry
    role: lane-registration-owner
    files:
      - registry/lawful-learning-lane.yaml
      - docs/LAWFUL_LEARNING_PHASE8_REGISTRATION.md

  superconscious:
    layer: doctrine-and-certificate-surface
    role: doctrine-owner
    files:
      - docs/composition/TIER2_INVARIANT_BINDINGS.md
      - docs/adapter-boundary-matrix.md
      - examples/TRUST_SURFACE.lawful-learning.yaml

  systems-learning-loops:
    layer: research-evidence-corpus
    role: source-and-claims-registry-owner
    planned_or_existing_surfaces:
      - source registry
      - claims registry
      - invariant patterns
      - ontology

  sourceos-spec:
    layer: canonical-schema-authority
    role: promoted-schema-owner
    status: pending_stability_review

  ontogenesis:
    layer: semantic-vocabulary
    role: semantic-vocabulary-and-draft-contract-owner

  agentplane:
    layer: execution-evidence-replay
    role: runtime-evidence-and-replay-owner
    status: phase9_pending

  policy-fabric:
    layer: cancellation-admission
    role: admission-and-policy-decision-owner

  model-governance-ledger:
    layer: model-governance-consent
    role: consent-attribution-intervention-and-audit-owner

  model-router:
    layer: routing
    role: provider-and-model-route-owner

required_governance_documents:
  tier2_composition_invariants:
    repo: SocioProphet/superconscious
    path: docs/composition/TIER2_INVARIANT_BINDINGS.md
    role: constrains lawful-learning composition claims and Tier-2 invariant modes
    required_for:
      - composition_claims
      - certificate_binding
      - trust_surface_composition

  adapter_boundary_matrix:
    repo: SocioProphet/superconscious
    path: docs/adapter-boundary-matrix.md
    role: constrains adapter invocation and final-authority ownership across repos
    required_for:
      - adapter_invocation
      - trust_surface_review
      - cross_repo_registration

  lawful_learning_trust_surface_example:
    repo: SocioProphet/superconscious
    path: examples/TRUST_SURFACE.lawful-learning.yaml
    role: declares lawful-learning trust-surface composition and non-claims
    required_for:
      - trust_surface_validation

phase_status:
  phase_1_to_6:
    repo: SocioProphet/superconscious
    state: doctrine, schemas, checker, and hardened fixtures captured
  phase_7:
    repo: SocioProphet/systems-learning-loops
    state: source registry, claims registry, invariant patterns, and ontology seeded
  phase_8:
    repo: SocioProphet/sociosphere
    state: registration seed in this PR
  phase_9:
    repo: SocioProphet/agentplane
    state: pending runtime evidence integration

allowed_claims:
  - SocioSphere may discover the lawful-learning lane and route governance review.
  - SocioSphere may point to Superconscious as doctrine owner.
  - SocioSphere may point to SourceOS spec as future canonical schema owner after promotion.
  - SocioSphere may point to systems-learning-loops as research evidence source corpus.
  - SocioSphere may point to AgentPlane as the future runtime evidence/replay integration owner.

non_claims:
  - no_runtime_receipt_lookup
  - no_runtime_non_claim_verification
  - no_runtime_monitor_attestation
  - no_schema_promotion_by_registration
  - no_frontier_claim_promotion
  - no_adapter_authority_transfer
  - no_policy_admission_bypass
  - no_model_governance_bypass
  - no_evidence_authenticity_claim
  - no_sourceos_spec_promotion_without_review

release_gates:
  - required governance document references are live
  - doctrine owner is named
  - research evidence corpus is named
  - future canonical schema owner is named
  - execution/evidence/replay owner is named
  - admission owner is named
  - model-governance owner is named
  - routing owner is named
  - non-claims are explicit

implementation_gates:
  - policy-fabric admission for runtime actions
  - agentplane evidence/replay receipt path
  - model-governance-ledger audit or consent record when model governance is implicated
  - sourceos-spec promotion for canonical schemas before broad runtime adoption
