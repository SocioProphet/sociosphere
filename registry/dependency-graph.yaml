# dependency-graph.yaml — SocioProphet workspace directed dependency graph
# Topological levels (0 = no deps, higher = more deps).
# schema_version: 1

metadata:
  version: "1.0"
  cycle_detected: false
  total_nodes: 53
  total_edges: 28

# ── Topological Levels ────────────────────────────────────────────────────────
# Level 0: no dependencies — can always build/merge first
level_0:
  - prophet-platform-standards    # normative ADR foundation
  - socioprophet-standards-knowledge  # schema authority
  - TriTRPC                       # standalone transport protocol

# Level 1: depend only on level-0
level_1:
  - socioprophet-standards-storage  # depends on prophet-platform-standards (governs)
  - gaia-world-model                # depends on socioprophet-standards-knowledge (governs)
  - agentplane                      # depends on TriTRPC (transport) + standards-storage (schemas)

# Level 2: depend on level-0 or level-1
level_2:
  - sociosphere                   # depends on all of level-0 and level-1 (orchestrates)
  - slash-topics                  # depends on agentplane (receipt path)
  - human-digital-twin            # depends on agentplane (receipt path)
  - cairnpath-mesh                # depends on agentplane (replay materialisation)
  - ontogenesis                   # depends on gaia-world-model (ontology generation)
  - semantic-serdes               # depends on TriTRPC (serialization)
  - prophet-core-contracts        # depends on prophet-platform-standards (implements)
  - prophet-core-ledger           # depends on prophet-platform-standards ADR-050 (audit)

# Level 3: depend on level-2
level_3:
  - prophet-core-libs             # depends on prophet-core-contracts
  - prophet-core-policy           # depends on prophet-core-contracts, agentplane
  - prophet-core-catalog          # depends on prophet-core-libs, gaia-world-model
  - prophet-core-query            # depends on prophet-core-catalog
  - prophet-core-ingest           # depends on prophet-core-catalog, gaia-world-model
  - mcp-a2a-zero-trust            # depends on sociosphere (compliance), TriTRPC
  - sourceos-a2a-mcp-bootstrap    # depends on agentplane, mcp-a2a-zero-trust
  - workspace-inventory           # depends on sociosphere (manifest)

# Level 4: depend on level-3+
level_4:
  - prophet-core-infra            # depends on prophet-core-libs, prophet-core-policy
  - prophet-core-scaffolder       # depends on prophet-core-libs
  - prophet-platform              # depends on prophet-core-* cluster
  - socioprophet                  # product — depends on everything (tracked separately)

