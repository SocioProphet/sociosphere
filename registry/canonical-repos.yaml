# sociosphere canonical repository registry
# Single source of truth for all SocioProphet repositories.
# Phase A: initial population — all entries marked for Phase B ontology extraction
# and Phase C deduplication/consolidation.
#
# layer values:
#   control-plane   – workspace orchestration, runner, CI/CD gating
#   core-platform   – contracts, capabilities, shared libraries
#   data-plane      – GAIA domain: ingest, catalog, query, storage
#   governance      – delivery excellence, policy, compliance, ADRs
#   identity        – identity primitives, entity graph
#   research        – theoretical, experimental, benchmarking
#   archive         – read-only preservation
#
# status values:
#   active      – actively maintained and developed
#   incubating  – early-stage or purpose not yet confirmed
#   archive     – read-only, no further active development

repos:

