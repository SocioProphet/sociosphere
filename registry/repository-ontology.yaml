# repository-ontology.yaml
# Semantic identity of each repository: controlled vocabulary, topic models, and
# semantic bindings to other repos.
# Auto-updated by: python cli/analyze-ontology.py
# Last updated: 2026-04-06

ontologies:
  # ── SocioProphet core repos ──────────────────────────────────────────────

  sociosphere:
    layer: control-plane
    controlled_vocabulary:
      - workspace
      - governance
      - composition
      - validation
      - gates
      - manifest
      - runner
      - standards
      - policy
      - orchestration
    top_topics:
      - workspace-orchestration
      - governance-enforcement
      - policy-validation
      - manifest-management
      - standards-compliance
    semantic_bindings:
      controls:
        - prophet-platform
        - agentplane
        - new-hope
        - slash-topics
      governed_by:
        - socioprophet-standards-storage
        - socioprophet-standards-knowledge
      uses:
        - TriTRPC
        - ontogenesis
    lsa_topics:
      - topic: "workspace-control"
        terms: [workspace, manifest, runner, component, lock, toml]
      - topic: "governance-gates"
        terms: [governance, validate, policy, standards, gate, fips]
      - topic: "semantic-composition"
        terms: [composition, semantic, ontology, graph, binding]

  prophet-platform:
    layer: core-platform
    controlled_vocabulary:
      - contract
      - capability
      - service
      - interface
      - protocol
      - rpc
      - transport
      - envelope
      - framing
    top_topics:
      - contract-specification
      - service-interface
      - capability-declaration
      - rpc-transport
      - protocol-framing
    semantic_bindings:
      used_by:
        - sociosphere
        - agentplane
        - new-hope
        - slash-topics
      depends_on:
        - TriTRPC
        - socioprophet-standards-knowledge
    lsa_topics:
      - topic: "contract-layer"
        terms: [contract, capability, service, interface, declare]
      - topic: "transport"
        terms: [rpc, transport, envelope, framing, protocol]
      - topic: "platform-core"
        terms: [platform, core, service, provider, consumer]

