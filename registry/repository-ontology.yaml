# repository-ontology.yaml — SocioProphet workspace role/relationship ontology
# Defines the controlled vocabulary, 16 roles, 8 relationship types, and semantic bindings.
# schema_version: 1

metadata:
  base_iri: "https://sociosphere.socioprophet.io/ontology/"
  version: "1.0"
  description: "Role and relationship ontology for the SocioProphet multi-repo ecosystem."

# ── Layers ────────────────────────────────────────────────────────────────────
# Top-level architectural layers that repos belong to.
layers:
  - id: control-plane
    label: "Control Plane"
    description: "Workspace orchestration, manifest/lock, runner, registry, compliance."
  - id: core-platform
    label: "Core Platform"
    description: "Core protocol, execution, identity, and infrastructure components."
  - id: governance
    label: "Governance"
    description: "Standards, policies, ADRs, delivery processes, and compliance frameworks."
  - id: data-plane
    label: "Data Plane"
    description: "Ontologies, knowledge graphs, topic packs, and semantic data stores."
  - id: identity
    label: "Identity"
    description: "Zero-trust identity, attestation, reputation, and security components."
  - id: product
    label: "Product"
    description: "User-facing product applications and documentation."
  - id: research
    label: "Research"
    description: "Research projects, experiments, and exploratory work."

# ── Roles (16) ────────────────────────────────────────────────────────────────
roles:
  - id: workspace-controller
    label: "Workspace Controller"
    layer: control-plane
    description: "Owns the manifest+lock, runner, registry, and compliance tooling."
    singleton: true

  - id: standards
    label: "Standards"
    layer: governance
    description: "Normative standards documents, ADRs, and policy definitions."

  - id: protocol
    label: "Protocol"
    layer: core-platform
    description: "Wire protocols, RPC definitions, fixture packs, and encoding specs."

  - id: execution-plane
    label: "Execution Plane"
    layer: core-platform
    description: "Bundle execution, evidence collection, replay, and governance."

  - id: ontology
    label: "Ontology"
    layer: data-plane
    description: "OWL/RDF ontologies, semantic models, and knowledge bases."

  - id: knowledge-graph
    label: "Knowledge Graph"
    layer: data-plane
    description: "Graph-structured knowledge stores and entity relationship models."

  - id: topic-pack
    label: "Topic Pack"
    layer: data-plane
    description: "Governed topic packs, membrane outputs, and semantic BI feeds."

  - id: component
    label: "Component"
    layer: core-platform
    description: "Feature component with build/test/deploy task contract."

  - id: library
    label: "Library"
    layer: core-platform
    description: "Shared library or utility code."

  - id: tool
    label: "Tool"
    layer: control-plane
    description: "CLI tool or automation script."

  - id: infra
    label: "Infrastructure"
    layer: core-platform
    description: "Infrastructure-as-code definitions (K8s, Helm, Terraform)."

  - id: api
    label: "API"
    layer: core-platform
    description: "REST or RPC API service definition or implementation."

  - id: security
    label: "Security"
    layer: identity
    description: "Security, zero-trust, attestation, and compliance enforcement."

  - id: bootstrap
    label: "Bootstrap"
    layer: core-platform
    description: "Bootstrap tooling for initializing a subsystem or environment."

  - id: process
    label: "Process"
    layer: governance
    description: "Process definitions, workflows, and delivery practices."

  - id: product
    label: "Product"
    layer: product
    description: "User-facing product application with constitutional material."

  - id: research
    label: "Research"
    layer: research
    description: "Research projects, experiments, and exploratory work."

  - id: docs
    label: "Documentation"
    layer: governance
    description: "Documentation sites and reference material."

  - id: replay
    label: "Replay"
    layer: core-platform
    description: "Replayable execution checkpoints and materialization."

  - id: contracts
    label: "Contracts"
    layer: core-platform
    description: "API contracts, interface definitions, and compatibility specs."

  - id: contract
    label: "Contract"
    layer: core-platform
    description: "API contracts, interface definitions, and compatibility specs."

  - id: reference
    label: "Reference"
    layer: identity
    description: "Reference implementations demonstrating architectural patterns."

  - id: agent
    label: "Agent"
    layer: research
    description: "Autonomous agent implementation."

  - id: bundle
    label: "Bundle"
    layer: research
    description: "Combined artifact bundle for deployment or research."

  - id: service
    label: "Service"
    layer: research
    description: "Standalone service implementation."

  - id: intelligence
    label: "Intelligence"
    layer: governance
    description: "Intelligence aggregation, analysis, and reporting."

  - id: data
    label: "Data"
    layer: data-plane
    description: "Curated data sets and data vaults."

  - id: spec
    label: "Specification"
    layer: core-platform
    description: "Protocol or system specification documents."

  - id: client
    label: "Client"
    layer: core-platform
    description: "Client library for a service or API."

# ── Relationship Types (8) ────────────────────────────────────────────────────
relationships:
  - id: controls
    label: "controls"
    description: "Source repo orchestrates or manages target repo."
    inverse: controlled_by

  - id: depends_on
    label: "depends_on"
    description: "Source repo requires target repo at build/test/runtime."
    inverse: depended_on_by

  - id: governed_by
    label: "governed_by"
    description: "Source repo must comply with standards defined in target repo."
    inverse: governs

  - id: implements
    label: "implements"
    description: "Source repo implements a protocol or spec defined in target repo."
    inverse: implemented_by

  - id: extends
    label: "extends"
    description: "Source repo extends or specialises target repo."
    inverse: extended_by

  - id: deduplicates_with
    label: "deduplicates_with"
    description: "Source and target repos have overlapping scope — consolidation needed."
    symmetric: true

  - id: produces_for
    label: "produces_for"
    description: "Source repo produces artifacts consumed by target repo."
    inverse: consumes_from

  - id: part_of
    label: "part_of"
    description: "Source repo is a sub-component or sub-module of target repo."
    inverse: has_part

# ── Semantic Bindings (core repos) ───────────────────────────────────────────
# Explicit relationship assertions for the most important cross-repo links.
semantic_bindings:
  - subject: sociosphere
    predicate: controls
    object: agentplane
    note: "sociosphere manifest drives agentplane execution bundle"

  - subject: sociosphere
    predicate: controls
    object: prophet-platform-standards
    note: "sociosphere registry tracks and enforces standards compliance"

  - subject: agentplane
    predicate: depends_on
    object: TriTRPC
    note: "agentplane uses TriTRPC for execution transport"

  - subject: agentplane
    predicate: depends_on
    object: socioprophet-standards-storage
    note: "agentplane depends on shared schemas from standards-storage PR#13"

  - subject: TriTRPC
    predicate: depends_on
    object: socioprophet-standards-storage
    note: "TriTRPC slice shared schemas defined in standards-storage"

  - subject: TriTRPC
    predicate: governed_by
    object: prophet-platform-standards
    note: "TriTRPC must comply with ADR-040 transport and ADR-050 audit standards"

  - subject: agentplane
    predicate: governed_by
    object: prophet-platform-standards
    note: "agentplane execution must comply with ADR-040/050/060"

  - subject: slash-topics
    predicate: produces_for
    object: agentplane
    note: "slash-topics provides topic-pack context to agentplane receipt path"

  - subject: human-digital-twin
    predicate: produces_for
    object: agentplane
    note: "human-digital-twin provides policy/approval events to agentplane receipt path"

  - subject: gaia-world-model
    predicate: governed_by
    object: socioprophet-standards-knowledge
    note: "GAIA ontology must follow knowledge standards"

  - subject: prophet-domain-gaia-ontology
    predicate: deduplicates_with
    object: gaia-world-model
    note: "Potential overlap — Phase C deduplication required"

  - subject: mcp-a2a-zero-trust
    predicate: deduplicates_with
    object: sourceos-a2a-mcp-bootstrap
    note: "Overlap in A2A/MCP scope — Phase C consolidation target"

  - subject: socioprophet-standards-storage
    predicate: governed_by
    object: prophet-platform-standards
    note: "Storage standards must comply with normative platform ADRs"

  - subject: prophet-core-ledger
    predicate: implements
    object: prophet-platform-standards
    note: "Ledger implements immutable audit log spec from ADR-050"

  - subject: cairnpath-mesh
    predicate: depends_on
    object: agentplane
    note: "cairnpath-mesh replay materializes agentplane bundle artifacts"

  - subject: ontogenesis
    predicate: produces_for
    object: gaia-world-model
    note: "ontogenesis generates ontology artifacts consumed by gaia-world-model"

# ── Controlled Vocabulary ─────────────────────────────────────────────────────
controlled_vocabulary:
  status:
    - active      # Actively developed with real PRs/issues
    - incubating  # Created but not yet substantially developed
    - archive     # Deprecated or absorbed; should be archived
  priority:
    - P0  # Must-have: blocks critical path
    - P1  # High: next-wave work, unblocks downstream
    - P2  # Medium: important but not blocking
    - P3  # Low: exploratory, research, or cleanup
  layer:
    - control-plane
    - core-platform
    - governance
    - data-plane
    - identity
    - product
    - research
