version: "0.2.0"
updated_at: "2026-05-01"
kind: LatticeDataGovernAITopologyRegistration

umbrella:
  repo: SocioProphet/prophet-platform
  issue: 291
  product_surface: Lattice Studio/Data/GovernAI
  purpose: "Reproducible community AI workbench for data products, notebooks, models, prompts, agents, publications, active metadata, trust, and evidence."

spine:
  - ContentAsset
  - CatalogAsset
  - DataProduct
  - AnnotationSet
  - LabelingProject
  - AnnotationReliabilityScore
  - TrainingDataset
  - EvaluationDataset
  - TrainingUsePolicy
  - RuntimeAsset
  - NotebookSession
  - QueryRun
  - RayBeamJob
  - ModelCandidate
  - ModelZooEntry
  - PromptAsset
  - RAGPipeline
  - VectorIndex
  - EvaluationBundle
  - Factsheet
  - PublicationArtifact
  - ResearchPackage
  - ReviewWorkflow
  - ActiveMetadataEvent
  - TrustSignal
  - TrustPostureSummary
  - PlatformAssetRecord

lanes:
  - id: canonical-contracts
    owner_repo: SourceOS-Linux/sourceos-spec
    tracking_refs:
      - SourceOS-Linux/sourceos-spec#75
    role: canonical-schema-owner
    owns:
      - DataProduct
      - DataContract
      - QualityProfile
      - AnnotationSet
      - EvaluationBundle
      - Factsheet
      - PublicationArtifact
    must_not:
      - implement-product-fixtures
      - own-runtime-execution

  - id: platform-vertical-fixture
    owner_repo: SocioProphet/prophet-platform
    tracking_refs:
      - SocioProphet/prophet-platform#299
    role: product-fixture-owner
    owns:
      - CatalogAsset
      - NotebookSession
      - QueryRun
      - PromotionCandidate
      - PlatformAssetRecord
    consumes:
      - SourceOS-Linux/sourceos-spec#75
      - SocioProphet/lattice-forge#10
    must_not:
      - redefine-canonical-schemas
      - own-agent-execution

  - id: platform-expanded-product-surfaces
    owner_repo: SocioProphet/prophet-platform
    tracking_refs:
      - SocioProphet/prophet-platform#300
      - SocioProphet/prophet-platform#301
      - SocioProphet/prophet-platform#302
      - SocioProphet/prophet-platform#303
      - SocioProphet/prophet-platform#304
      - SocioProphet/prophet-platform#305
    role: product-surface-owner
    owns:
      - ModelZooEntry
      - ModelEndpoint
      - PromptAsset
      - RAGPipeline
      - VectorIndex
      - ResearchPackage
      - ReviewThread
      - ReviewDecision
      - CitationGraph
      - ReproductionAttempt
      - LabelingProject
      - AnnotationReliabilityScore
      - TrainingDataset
      - EvaluationDataset
      - TrainingUsePolicy
      - ActiveMetadataEvent
      - TrustSignal
      - TrustPostureSummary
    consumes:
      - SourceOS-Linux/sourceos-spec#75
      - SocioProphet/lattice-forge#10
      - SocioProphet/policy-fabric#40
    must_not:
      - redefine-canonical-schemas
      - own-search-index
      - own-topic-public-surface
      - own-semantic-membrane

  - id: runtime-production
    owner_repo: SocioProphet/lattice-forge
    tracking_refs:
      - SocioProphet/lattice-forge#10
    role: runtime-artifact-owner
    owns:
      - RuntimeAsset
      - runtime-lockfiles
      - kernel-metadata
      - runtime-sbom-signature-scan-evidence
    must_not:
      - own-data-product-policy
      - own-platform-ui

  - id: governed-mlops-execution
    owner_repo: SocioProphet/prophet-platform-fabric-mlops-ts-suite
    tracking_refs:
      - SocioProphet/prophet-platform-fabric-mlops-ts-suite#33
    role: mlops-fixture-owner
    owns:
      - RayJobDryRunPlan
      - BeamPipelineDryRunPlan
      - LineageRun
      - PromotionGate
    consumes:
      - DataProduct
      - DataContract
      - RuntimeAsset
      - EvaluationBundle
    must_not:
      - own-canonical-data-schemas
      - bypass-policy-fabric

  - id: policy-subjects
    owner_repo: SocioProphet/policy-fabric
    tracking_refs:
      - SocioProphet/policy-fabric#39
      - SocioProphet/policy-fabric#40
    role: policy-gate-owner
    owns:
      - policy-subject-fixtures
      - allow-deny-review-required-decisions
      - promotion-gate-rules
    consumes:
      - DataProduct
      - RuntimeAsset
      - NotebookSession
      - ModelAsset
      - ModelZooEntry
      - PromptAsset
      - RAGPipeline
      - AgentAsset
      - EvaluationBundle
      - Factsheet
      - PublicationArtifact
      - ResearchPackage
      - ActiveMetadataEvent
      - TrustPostureSummary
    must_not:
      - create-parallel-metadata-spine

  - id: topology-registration
    owner_repo: SocioProphet/sociosphere
    tracking_refs:
      - SocioProphet/sociosphere#237
      - SocioProphet/sociosphere#238
    role: topology-governor
    owns:
      - dependency-direction
      - lane-registration
      - build-intelligence-routing
      - topology-validation
    consumes:
      - all-lattice-lane-records
    must_not:
      - implement-downstream-features

  - id: search-indexing
    owner_repo: SocioProphet/sherlock-search
    tracking_refs:
      - SocioProphet/sherlock-search#29
      - SocioProphet/sherlock-search#30
      - SocioProphet/sherlock-search#31
    role: search-consumer
    consumes:
      - PlatformAssetRecord
      - policyRef
      - evidenceCorrelationId
      - trust-fields
      - model-zoo-records
      - prompt-rag-records
      - publication-review-records
      - annotation-training-records
      - active-metadata-records
    must_not:
      - redefine-asset-identity

  - id: topic-classification
    owner_repo: SocioProphet/slash-topics
    tracking_refs:
      - SocioProphet/slash-topics#22
      - SocioProphet/slash-topics#23
      - SocioProphet/slash-topics#24
    role: public-topic-governance-surface
    consumes:
      - PlatformAssetRecord
      - DataProduct
      - ModelAsset
      - ModelZooEntry
      - PromptAsset
      - RAGPipeline
      - PublicationArtifact
      - ResearchPackage
      - TrainingDataset
      - EvaluationDataset
      - ActiveMetadataEvent
      - TrustPostureSummary
    must_not:
      - own-runtime-substrate

  - id: semantic-membrane
    owner_repo: SocioProphet/new-hope
    tracking_refs:
      - SocioProphet/new-hope#6
      - SocioProphet/new-hope#7
      - SocioProphet/new-hope#8
    role: internal-semantic-membrane
    consumes:
      - PlatformAssetRecord
      - topic-classification
      - policyRef
      - evidenceCorrelationId
      - ModelZooEntry
      - RAGPipeline
      - TrainingDataset
      - ResearchPackage
      - TrustPostureSummary
    must_not:
      - replace-slash-topics-public-surface

  - id: execution-consumer
    owner_repo: SocioProphet/agentplane
    tracking_refs:
      - SocioProphet/agentplane#75
      - SocioProphet/agentplane#76
    role: governed-execution-consumer
    consumes:
      - RuntimeAsset
      - DataProduct
      - ModelAsset
      - EvaluationBundle
      - PublicationArtifact
      - PolicyBundle
    must_not:
      - own-lattice-canonical-schemas

  - id: developer-home
    owner_repo: SocioProphet/cloudshell-fog
    tracking_refs:
      - SocioProphet/cloudshell-fog#29
      - SocioProphet/cloudshell-fog#30
    role: user-workbench-shell-surface
    consumes:
      - PlatformAssetRecord
      - RuntimeAsset
      - DataProduct
      - EvidenceBundle
      - Factsheet
    must_not:
      - bypass-policy-fabric
      - bypass-agentplane

dependency_direction_rules:
  canonical_schemas_flow_from:
    - SourceOS-Linux/sourceos-spec
  platform_records_flow_from:
    - SocioProphet/prophet-platform
    - SocioProphet/prophet-platform-fabric-mlops-ts-suite
  runtime_artifacts_flow_from:
    - SocioProphet/lattice-forge
  policy_decisions_flow_from:
    - SocioProphet/policy-fabric
  topology_governance_flow_from:
    - SocioProphet/sociosphere
  consumers:
    - SocioProphet/sherlock-search
    - SocioProphet/slash-topics
    - SocioProphet/new-hope
    - SocioProphet/agentplane
    - SocioProphet/cloudshell-fog

validation_requirements:
  required_lanes:
    - canonical-contracts
    - platform-vertical-fixture
    - platform-expanded-product-surfaces
    - runtime-production
    - governed-mlops-execution
    - policy-subjects
    - topology-registration
    - search-indexing
    - topic-classification
    - semantic-membrane
    - execution-consumer
    - developer-home
  required_tracking_refs:
    - SourceOS-Linux/sourceos-spec#75
    - SocioProphet/prophet-platform#299
    - SocioProphet/prophet-platform#300
    - SocioProphet/prophet-platform#301
    - SocioProphet/prophet-platform#302
    - SocioProphet/prophet-platform#303
    - SocioProphet/prophet-platform#304
    - SocioProphet/prophet-platform#305
    - SocioProphet/lattice-forge#10
    - SocioProphet/prophet-platform-fabric-mlops-ts-suite#33
    - SocioProphet/policy-fabric#39
    - SocioProphet/policy-fabric#40
    - SocioProphet/sociosphere#237
    - SocioProphet/sociosphere#238
    - SocioProphet/sherlock-search#29
    - SocioProphet/sherlock-search#30
    - SocioProphet/sherlock-search#31
    - SocioProphet/slash-topics#22
    - SocioProphet/slash-topics#23
    - SocioProphet/slash-topics#24
    - SocioProphet/new-hope#6
    - SocioProphet/new-hope#7
    - SocioProphet/new-hope#8
    - SocioProphet/agentplane#75
    - SocioProphet/agentplane#76
    - SocioProphet/cloudshell-fog#29
    - SocioProphet/cloudshell-fog#30
  expanded_asset_surfaces:
    - ModelZooEntry
    - PromptAsset
    - RAGPipeline
    - ResearchPackage
    - TrainingDataset
    - EvaluationDataset
    - ActiveMetadataEvent
    - TrustPostureSummary
  forbid_parallel_metadata_spines: true
  require_policy_before_publication: true
  require_runtime_before_execution: true
  require_platform_record_before_search: true
